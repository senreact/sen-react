name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required check (branch-protection-pinned): keep the job name stable.
  # It actually runs more steps now (test step inserted between typecheck
  # and build) but the historical name avoids breaking branch protection.
  validate:
    name: Lint, format, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Migration guard (no hand-written migrations)
        run: pnpm check:migrations

      - name: Test (Vitest unit + integration)
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Public CMS URL — no secret, just needed so Next.js can reach the
          # CMS during static prerender. Without it, requireGlobal() throws
          # because NEXT_PUBLIC_CMS_URL is unset and fetchGlobal() returns null.
          NEXT_PUBLIC_CMS_URL: https://cms.senreact.com

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  # CI-triggered deploys are not currently the gate — Vercel's
  # `gitProviderOptions.createDeployments = disabled` doesn't actually
  # block auto-deploys (observed: project setting persists in the API
  # but Vercel still fires deploys on push), and `commandForIgnoringBuildStep`
  # doesn't expose deployment metadata env vars during the ignore step,
  # so meta-tag gating couldn't differentiate auto vs API deploys.
  #
  # Current deploy-budget strategy:
  #   1. Vercel auto-deploys on every push (we accept this)
  #   2. `commandForIgnoringBuildStep` per project filters out builds
  #      whose paths don't match (project-relevant paths only)
  #   3. CI failure deploys do still consume budget — small cost given
  #      most pushes pass CI
  #
  # If we ever do need full CI-gating, the path forward is to use
  # Vercel CLI from a deploy job that posts to deploy hooks (per-branch
  # URLs created via API) rather than the deployments API endpoint.
