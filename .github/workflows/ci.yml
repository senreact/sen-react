name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required check (branch-protection-pinned): keep the job name stable.
  # It actually runs more steps now (test step inserted between typecheck
  # and build) but the historical name avoids breaking branch protection.
  validate:
    name: Lint, format, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (Vitest unit + integration)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  # Per Tom's deploy-budget flag: trigger Vercel deploys ourselves once
  # `validate` is green, instead of letting Vercel auto-deploy on push.
  # Vercel auto-deploy is disabled at the project level
  # (gitProviderOptions.createDeployments = "disabled"); this job is the
  # only path to a deploy. Cross-job path filters mirror the
  # commandForIgnoringBuildStep settings on each Vercel project so we
  # don't deploy a project whose paths didn't change.
  deploy-previews:
    name: Trigger Vercel previews
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - name: Checkout (with full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute path-changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          web_paths='apps/web packages/shared pnpm-lock.yaml package.json tsconfig.base.json tsconfig.json eslint.config.mjs'
          cms_paths='apps/cms packages/shared pnpm-lock.yaml package.json tsconfig.base.json tsconfig.json eslint.config.mjs'
          # shellcheck disable=SC2086
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- $web_paths | grep -q .; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          # shellcheck disable=SC2086
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- $cms_paths | grep -q .; then
            echo "cms=true" >> "$GITHUB_OUTPUT"
          else
            echo "cms=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy sen-react preview
        id: deploy-web
        if: steps.changes.outputs.web == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          GIT_REPO_ID: ${{ github.event.pull_request.head.repo.id }}
          REF: ${{ github.event.pull_request.head.ref }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          payload=$(jq -nc \
            --arg name "sen-react" \
            --arg projectId "$VERCEL_PROJECT_ID" \
            --arg ref "$REF" \
            --arg sha "$SHA" \
            --argjson repoId "$GIT_REPO_ID" \
            '{name: $name, project: $projectId, gitSource: {type: "github", repoId: $repoId, ref: $ref, sha: $sha}}')
          response=$(curl -sS -X POST "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")
          url=$(echo "$response" | jq -r '.url // empty')
          if [ -z "$url" ]; then
            echo "Deploy failed:"
            echo "$response" | jq .
            exit 1
          fi
          echo "url=https://$url" >> "$GITHUB_OUTPUT"

      - name: Deploy sen-react-cms preview
        id: deploy-cms
        if: steps.changes.outputs.cms == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CMS }}
          GIT_REPO_ID: ${{ github.event.pull_request.head.repo.id }}
          REF: ${{ github.event.pull_request.head.ref }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          payload=$(jq -nc \
            --arg name "sen-react-cms" \
            --arg projectId "$VERCEL_PROJECT_ID" \
            --arg ref "$REF" \
            --arg sha "$SHA" \
            --argjson repoId "$GIT_REPO_ID" \
            '{name: $name, project: $projectId, gitSource: {type: "github", repoId: $repoId, ref: $ref, sha: $sha}}')
          response=$(curl -sS -X POST "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")
          url=$(echo "$response" | jq -r '.url // empty')
          if [ -z "$url" ]; then
            echo "Deploy failed:"
            echo "$response" | jq .
            exit 1
          fi
          echo "url=https://$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URLs on PR
        if: steps.changes.outputs.web == 'true' || steps.changes.outputs.cms == 'true'
        uses: actions/github-script@v8
        env:
          WEB_URL: ${{ steps.deploy-web.outputs.url }}
          CMS_URL: ${{ steps.deploy-cms.outputs.url }}
        with:
          script: |
            const lines = ['### Preview deployments'];
            if (process.env.WEB_URL) {
              lines.push(`- **sen-react** (apps/web): ${process.env.WEB_URL}`);
            }
            if (process.env.CMS_URL) {
              lines.push(`- **sen-react-cms** (apps/cms): ${process.env.CMS_URL}`);
            }
            lines.push('');
            lines.push(`Deployed from \`${context.sha.slice(0, 7)}\` after CI green.`);
            const body = lines.join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # Production deploy on main pushes — same gating as preview, but with
  # target: "production" so the deployment promotes to the prod alias.
  # Path filter is broader because ANY merge to main is a production
  # release we want to roll out (CMS schema changes affect both projects
  # via the migration step).
  deploy-production:
    name: Deploy production
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (with full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute path-changes since previous main commit
        id: changes
        run: |
          set -euo pipefail
          # On the first push or when previous SHA isn't reachable, deploy both.
          prev=$(git rev-parse HEAD^ 2>/dev/null || echo "")
          web_paths='apps/web packages/shared pnpm-lock.yaml package.json tsconfig.base.json tsconfig.json eslint.config.mjs'
          cms_paths='apps/cms packages/shared pnpm-lock.yaml package.json tsconfig.base.json tsconfig.json eslint.config.mjs'
          if [ -z "$prev" ]; then
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "cms=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # shellcheck disable=SC2086
          if git diff --name-only "$prev" HEAD -- $web_paths | grep -q .; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          else
            echo "web=false" >> "$GITHUB_OUTPUT"
          fi
          # shellcheck disable=SC2086
          if git diff --name-only "$prev" HEAD -- $cms_paths | grep -q .; then
            echo "cms=true" >> "$GITHUB_OUTPUT"
          else
            echo "cms=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy sen-react production
        if: steps.changes.outputs.web == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          GIT_REPO_ID: ${{ github.event.repository.id }}
          SHA: ${{ github.sha }}
        run: |
          payload=$(jq -nc \
            --arg name "sen-react" \
            --arg projectId "$VERCEL_PROJECT_ID" \
            --arg sha "$SHA" \
            --argjson repoId "$GIT_REPO_ID" \
            '{name: $name, project: $projectId, target: "production", gitSource: {type: "github", repoId: $repoId, ref: "main", sha: $sha}}')
          response=$(curl -sS -X POST "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID&forceNew=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")
          url=$(echo "$response" | jq -r '.url // empty')
          if [ -z "$url" ]; then
            echo "Deploy failed:"
            echo "$response" | jq .
            exit 1
          fi
          echo "Deployed: https://$url"

      - name: Deploy sen-react-cms production
        if: steps.changes.outputs.cms == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CMS }}
          GIT_REPO_ID: ${{ github.event.repository.id }}
          SHA: ${{ github.sha }}
        run: |
          payload=$(jq -nc \
            --arg name "sen-react-cms" \
            --arg projectId "$VERCEL_PROJECT_ID" \
            --arg sha "$SHA" \
            --argjson repoId "$GIT_REPO_ID" \
            '{name: $name, project: $projectId, target: "production", gitSource: {type: "github", repoId: $repoId, ref: "main", sha: $sha}}')
          response=$(curl -sS -X POST "https://api.vercel.com/v13/deployments?teamId=$VERCEL_TEAM_ID&forceNew=1" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")
          url=$(echo "$response" | jq -r '.url // empty')
          if [ -z "$url" ]; then
            echo "Deploy failed:"
            echo "$response" | jq .
            exit 1
          fi
          echo "Deployed: https://$url"
